name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Every Monday and Thursday at 9:00 AM UTC
  workflow_dispatch:        # Allows manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase drinks table
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/drinks?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Response status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase ping successful"
          else
            echo "❌ Supabase ping failed with status $STATUS"
            exit 1
          fi
